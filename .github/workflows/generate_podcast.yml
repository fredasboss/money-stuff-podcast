name: Generate Money Stuff Podcast Episode

on:
  repository_dispatch:
    types: [new_newsletter]

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install edge-tts mutagen

      - name: Generate MP3 with Edge TTS and ID3 tags
        env:
          NEWSLETTER_TEXT: ${{ toJson(github.event.client_payload.text) }}
          NEWSLETTER_SUBJECT: ${{ github.event.client_payload.subject }}
          NEWSLETTER_DATE: ${{ github.event.client_payload.date }}
        run: |
          python - <<'EOF'
          import asyncio
          import edge_tts
          import os
          import json
          from mutagen.id3 import ID3, TIT2, TPE1, TALB, ID3NoHeaderError
          from mutagen.mp3 import MP3

          text_raw = os.environ["NEWSLETTER_TEXT"]
          subject = os.environ["NEWSLETTER_SUBJECT"]
          date = os.environ["NEWSLETTER_DATE"]

          text = json.loads(text_raw)

          # Remove URLs
          import re
          text = re.sub(r'https?://\S+', '', text)
          text = re.sub(r'\n{3,}', '\n\n', text)
          text = text.strip()

          # Add spoken intro
          intro = f"Money Stuff Newsletter. {subject}. {date}.\n\n"
          full_text = intro + text

          # Truncate if too long
          if len(full_text) > 80000:
              full_text = full_text[:80000] + "\n\nEnd of newsletter."

          output_file = f"audio/{date}.mp3"
          os.makedirs("audio", exist_ok=True)

          async def generate():
              communicate = edge_tts.Communicate(full_text, voice="en-US-GuyNeural")
              await communicate.save(output_file)
              print(f"Audio saved to {output_file}")

          asyncio.run(generate())

          # Add ID3 tags so podcast apps recognize the file
          try:
              tags = ID3(output_file)
          except ID3NoHeaderError:
              tags = ID3()

          tags.add(TIT2(encoding=3, text=subject))
          tags.add(TPE1(encoding=3, text="Matt Levine"))
          tags.add(TALB(encoding=3, text="Money Stuff Podcast"))
          tags.save(output_file)

          size = os.path.getsize(output_file)
          print(f"MP3 size: {size} bytes")
          print(f"ID3 tags added successfully")
          EOF

      - name: Get MP3 file size
        id: filesize
        env:
          NEWSLETTER_DATE: ${{ github.event.client_payload.date }}
        run: |
          SIZE=$(stat -c%s "audio/${{ github.event.client_payload.date }}.mp3")
          echo "size=$SIZE" >> $GITHUB_OUTPUT
          echo "MP3 size: $SIZE bytes"

      - name: Update RSS feed
        env:
          NEWSLETTER_DATE: ${{ github.event.client_payload.date }}
          NEWSLETTER_SUBJECT: ${{ github.event.client_payload.subject }}
          GITHUB_USERNAME: fredasboss
          GITHUB_REPO: money-stuff-podcast
          FILE_SIZE: ${{ steps.filesize.outputs.size }}
        run: |
          python update_rss.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add audio/ feed.xml
          git commit -m "Add episode: ${{ github.event.client_payload.date }}"
          git push
